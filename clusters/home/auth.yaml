---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: lldap
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/auth/lldap
  prune: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: authelia
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/auth/authelia
  prune: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---