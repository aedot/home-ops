---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
spec:
  chart:
    spec:
      chart: prometheus-operator-crds
      version: 15.0.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  interval: 1h0m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3