                storage:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 5Gi
        grafana:
            plugins:
                - grafana-piechart-panel
            dashboardProviders:
                dashboardproviders.yaml:
                    apiVersion: 1
                    providers:
                        - name: default
                          orgId: 1
                          folder: ""
                          type: file
                          disableDeletion: false
                          editable: true
                          options:
                            path: /var/lib/grafana/dashboards/default
            dashboards:
                default:
                    node-exporter:
                        gnetId: 11074
                        revision: 9
                        datasource: Prometheus
                    node-exporter-full:
                        gnetId: 1860
                        revision: 37
                        datasource: Prometheus
                    traefik:
                        gnetId: 17347
