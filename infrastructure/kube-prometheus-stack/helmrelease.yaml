apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: kube-prometheus-stack
spec:
    chart:
        spec:
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: prometheus
            version: 65.3.1
    interval: 1h0m0s
    values:
        crds:
            enabled: false
        prometheus:
            prometheusSpec:
                serviceMonitorSelector:
                    matchLabels: null
                podMonitorSelector:
                    matchLabels: null
                externalUrl: ENC[AES256_GCM,data:kkyfNnCYYj8cLGmFFyIabeV/CdNomQNwSugsEX7WRbAfQmHUrI2H,iv:BBGR8VQ4EA1C0n1mwxK4LIpMFm+bHjn7Zh0ltLzwVyo=,tag:vPRKxRKeawW2szFeU/VkCw==,type:str]
                retention: 7d
                storageSpec:
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 20Gi
        alertmanager:
            alertmanagerSpec:
                externalUrl: ENC[AES256_GCM,data:B89f+1sjFMXEAzgsoDWELFCn5Qm7kwtZubW7Ar2ocj7hCA/9YvcQLSY=,iv:VWhXCKd1gQc4Q1ltWjm3MSay6tB9+rJCfXDGeUhXWM4=,tag:81LYsTsi1KqLNorKlzL+zw==,type:str]
