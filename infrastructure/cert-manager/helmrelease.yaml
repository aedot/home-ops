apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
      version: "v1.16.1"
  interval: 1h0m0s
  values:
    installCRDs: true

    extraArgs:
    - --dns01-recursive-nameservers=1.1.1.1:53
    - --dns01-recursive-nameservers-only

    cainjector:
      replicaCount: 1

    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        prometheusInstance: monitoring