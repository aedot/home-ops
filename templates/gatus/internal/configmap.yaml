---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "${APP}-gatus-internal-ep"
  labels:
    gatus.io/enabled: "true"
data:
  config.yaml: |
    endpoints:
      - name: "${APP}"
        group: internal
        url: 1.1.1.1
        interval: 1h
        dns:
          query-name: "${GATUS_SUBDOMAIN:-${APP}}.xtmcore.com"
          query-type: A
        conditions:
          - "len([BODY]) == 0"
        alerts:
          - type: slack